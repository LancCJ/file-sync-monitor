name: Release Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: ""
            tauri_script: "../node_modules/.bin/tauri"
          - name: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            tauri_script: "../node_modules/.bin/tauri"
          - name: Windows x64
            platform: windows-latest
            args: ""
            tauri_script: "../node_modules/.bin/tauri.cmd"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Setup Rust stable for macOS
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Setup Rust stable for Windows
        if: matrix.platform == 'windows-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./sync-kernel -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: sync-kernel
          tauriScript: ${{ matrix.tauri_script }}
          args: ${{ matrix.args }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.name }}
          if-no-files-found: error
          path: |
            sync-kernel/target/release/bundle/**/*.dmg
            sync-kernel/target/release/bundle/**/*.msi
            sync-kernel/target/release/bundle/**/*.exe
            sync-kernel/target/release/bundle/**/*.app.tar.gz
            sync-kernel/target/release/bundle/**/*.app.tar.gz.sig
            sync-kernel/target/*/release/bundle/**/*.dmg
            sync-kernel/target/*/release/bundle/**/*.msi
            sync-kernel/target/*/release/bundle/**/*.exe
            sync-kernel/target/*/release/bundle/**/*.app.tar.gz
            sync-kernel/target/*/release/bundle/**/*.app.tar.gz.sig

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: publish-tauri
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "FileSyncMonitor ${{ github.ref_name }}"
          body: "See the assets below to download and install FileSyncMonitor."
          draft: false
          prerelease: false
          files: release-assets/**/*
